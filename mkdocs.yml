site_name: PlayerDataPy
site_description: Python client for the PlayerData GraphQL API
site_url: https://playerdata.github.io/playerdatapy/
repo_url: https://github.com/PlayerData/playerdatapy
repo_name: PlayerData/playerdatapy
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://playerdata.com/
      name: playerdata.com
    - icon: fontawesome/brands/github
      link: https://github.com/PlayerData/playerdatapy
      name: GitHub

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Authentication: auth.md
  - Concepts: concepts.md
  - Metrics: metrics.md
  - Pagination & Limits: limits.md
  - Errors: errors.md
  - Examples: examples.md
  - FAQ: faq.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true
