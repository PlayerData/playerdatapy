site_name: PlayerData API
site_description: PlayerData GraphQL API documentation, with official Python SDK
site_url: https://playerdata.github.io/playerdatapy/
repo_url: https://github.com/PlayerData/playerdatapy
repo_name: PlayerData/playerdatapy
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.prune
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://playerdata.com/
      name: playerdata.com
    - icon: fontawesome/brands/github
      link: https://github.com/PlayerData/playerdatapy
      name: GitHub

nav:
  - Home: index.md
  - API:
      - Overview: api/overview.md
      - Authentication: auth.md
      - Concepts: concepts.md
      - Metrics: metrics.md
      - Pagination & Limits: limits.md
      - Errors: errors.md
      - Clients: clients.md
      - Schema: schema/
      - FAQ: faq.md
  - Python SDK:
      - Overview: python/index.md
      - Quickstart: quickstart.md
      - Examples: examples.md
      - Reference: reference/

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref.py
        - docs/gen_schema.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            extensions:
              - griffe_pydantic:
                  schema: true
            docstring_style: google
            show_source: false
            show_bases: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            heading_level: 2
            filters: ["!^_"]
            group_by_category: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 2
