name: Publish Python

on:
  workflow_call:
    inputs:
      new_release_published:
        description: 'Whether a new release has been published'
        required: true
        type: string
      new_release_version:
        description: 'The latest release version'
        required: true
        type: string

jobs:
  publish:
    name: Publish Python Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    environment:
      name: pypi

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-suffix: '-publish'
          activate-environment: true

      - name: Apply Semantic Version
        if: ${{ inputs.new_release_published == 'true' }}
        run: uv version ${{ inputs.new_release_version }}

      - name: Build
        if: ${{ inputs.new_release_published == 'true' }}
        run: uv build

      - name: Publish
        if: ${{ inputs.new_release_published == 'true' }}
        run: uv publish --trusted-publishing always

