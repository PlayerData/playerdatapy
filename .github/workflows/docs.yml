name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "playerdatapy/**"
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: false

permissions:
  contents: write

env:
  DISABLE_MKDOCS_2_WARNING: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true
      - name: Install
        run: uv sync --group docs
      - name: Build & deploy
        run: uv run mkdocs gh-deploy --clean
