name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "playerdatapy/**"
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: false

permissions:
  contents: write

env:
  DISABLE_MKDOCS_2_WARNING: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install
        run: uv sync --group docs
      - name: Build & deploy
        run: uv run mkdocs gh-deploy --clean
