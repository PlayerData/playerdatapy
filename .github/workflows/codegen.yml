name: codegen

# Nightly: fetches the public schema SDL. If it drifted, reruns ariadne-codegen
# and opens a PR authored by the BeaverBot GitHub App (App ID 73365). Using an
# App token (not GITHUB_TOKEN) is required so downstream workflows (`ci.yml`,
# `docs.yml`, `publish.yml`) fire on the PR and on the resulting merge to main.

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
    paths:
      - "schema.graphql"
      - ".github/workflows/codegen.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  REMOTE_SCHEMA_URL: https://app.playerdata.co.uk/api/schema.graphql

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - name: Mint BeaverBot App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: 73365
          private-key: ${{ secrets.BEAVERBOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Fetch latest schema
        run: curl -fsSL "$REMOTE_SCHEMA_URL" -o schema.graphql
      - name: Detect schema drift
        id: drift
        run: |
          if git diff --quiet -- schema.graphql; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Schema unchanged — skipping codegen."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Schema drifted — running codegen."
          fi
      - uses: astral-sh/setup-uv@v3
        if: steps.drift.outputs.changed == 'true'
        with:
          enable-cache: true
      - name: Install
        if: steps.drift.outputs.changed == 'true'
        run: uv sync --group codegen --group test
      - name: Regenerate
        if: steps.drift.outputs.changed == 'true'
        run: uv run ariadne-codegen
      - name: Format
        if: steps.drift.outputs.changed == 'true'
        run: uv run ruff format .
      - name: Lint (autofix)
        if: steps.drift.outputs.changed == 'true'
        run: uv run ruff check --fix --exit-zero .
      - name: Lint (verify)
        if: steps.drift.outputs.changed == 'true'
        run: uv run ruff check .
      - name: Open PR
        id: cpr
        if: steps.drift.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "feat: regenerate SDK from schema"
          title: "feat: regenerate SDK from schema"
          branch: codegen/regen
          body: |
            Auto-regenerated by `.github/workflows/codegen.yml`.

            Nightly (06:00 UTC) job detected drift in `schema.graphql` (source:
            `${{ env.REMOTE_SCHEMA_URL }}`) and re-ran `ariadne-codegen`.
            Auto-merge enabled — merges once a CODEOWNER approves and CI passes.

            Uses `feat:` prefix so `semantic-release` cuts a new version and
            `publish.yml` releases the SDK to PyPI on merge to `main`.
            Docs deploy automatically via `docs.yml` (watches `playerdatapy/**`).
      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
