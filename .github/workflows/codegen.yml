name: codegen

# Note: PRs opened by this workflow use the default GITHUB_TOKEN, which by design
# does NOT trigger other workflows (e.g. docs.yml) on the resulting PR. To run CI
# on the regen PR, push an empty commit, close/reopen it, or swap to a fine-grained
# PAT via `token:` on the create-pull-request step.

on:
  push:
    branches: [main]
    paths:
      - "schema.graphql"
      - ".github/workflows/codegen.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install
        run: uv sync --group codegen
      - name: Regenerate
        run: uv run ariadne-codegen
      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: regenerate SDK from schema"
          title: "chore: regenerate SDK from schema"
          branch: codegen/regen
          body: |
            Auto-regenerated by `.github/workflows/codegen.yml` after `schema.graphql` change.
