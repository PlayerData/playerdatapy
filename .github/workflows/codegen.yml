name: codegen

# Auto-merge relies on a bot/PAT that can bypass CODEOWNERS + branch protection.
# Set the CODEGEN_TOKEN secret to a fine-grained PAT (or GitHub App installation
# token) owned by an actor listed in the ruleset's bypass list AND in CODEOWNERS
# for the paths touched. GITHUB_TOKEN alone cannot approve or bypass CODEOWNERS.

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
    paths:
      - "schema.graphql"
      - ".github/workflows/codegen.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  REMOTE_SCHEMA_URL: https://app.playerdata.co.uk/api/schema.graphql

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CODEGEN_TOKEN || github.token }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install
        run: uv sync --group codegen
      - name: Fetch latest schema
        run: curl -fsSL "$REMOTE_SCHEMA_URL" -o schema.graphql
      - name: Regenerate
        run: uv run ariadne-codegen
      - name: Open PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CODEGEN_TOKEN || github.token }}
          commit-message: "chore: regenerate SDK from schema"
          title: "chore: regenerate SDK from schema"
          branch: codegen/regen
          body: |
            Auto-regenerated by `.github/workflows/codegen.yml`.

            Nightly (06:00 UTC) job fetches `schema.graphql` from
            `${{ env.REMOTE_SCHEMA_URL }}` and re-runs `ariadne-codegen`.
            Auto-merges when CI is green.
      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.CODEGEN_TOKEN || github.token }}
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
      - name: Approve PR
        if: steps.cpr.outputs.pull-request-number && secrets.CODEGEN_TOKEN
        env:
          GH_TOKEN: ${{ secrets.CODEGEN_TOKEN }}
        run: gh pr review --approve "${{ steps.cpr.outputs.pull-request-number }}"
