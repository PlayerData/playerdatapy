name: codegen

# Nightly: fetches the public schema SDL. If it drifted, reruns ariadne-codegen
# and commits directly to main. Downstream workflows (ci, docs, publish) fire on push.

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
    paths:
      - "schema.graphql"
      - ".github/workflows/codegen.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  REMOTE_SCHEMA_URL: https://app.playerdata.co.uk/api/schema.graphql

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch latest schema
        run: curl -fsSL "$REMOTE_SCHEMA_URL" -o schema.graphql
      - name: Detect schema drift
        id: drift
        run: |
          if git diff --quiet -- schema.graphql; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Schema unchanged — skipping codegen."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Schema drifted — running codegen."
          fi
      - uses: astral-sh/setup-uv@v3
        if: steps.drift.outputs.changed == 'true'
        with:
          enable-cache: true
      - name: Install
        if: steps.drift.outputs.changed == 'true'
        run: uv sync --group codegen --group test
      - name: Regenerate
        if: steps.drift.outputs.changed == 'true'
        run: uv run ariadne-codegen
      - name: Format
        if: steps.drift.outputs.changed == 'true'
        run: uv run ruff format .
      - name: Lint (autofix)
        if: steps.drift.outputs.changed == 'true'
        run: uv run ruff check --fix --exit-zero .
      - name: Lint (verify)
        if: steps.drift.outputs.changed == 'true'
        run: uv run ruff check .
      - name: Commit & push to main
        if: steps.drift.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat: regenerate SDK from schema"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
