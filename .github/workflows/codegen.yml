name: codegen

# Nightly: fetches the public schema SDL. If it drifted, reruns ariadne-codegen
# and opens a PR with auto-merge enabled. PR merges once a CODEOWNER approves
# and required checks pass (GITHUB_TOKEN can queue auto-merge but not bypass
# review requirements on a public repo).

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
    paths:
      - "schema.graphql"
      - ".github/workflows/codegen.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  REMOTE_SCHEMA_URL: https://app.playerdata.co.uk/api/schema.graphql

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch latest schema
        run: curl -fsSL "$REMOTE_SCHEMA_URL" -o schema.graphql
      - name: Detect schema drift
        id: drift
        run: |
          if git diff --quiet -- schema.graphql; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Schema unchanged — skipping codegen."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Schema drifted — running codegen."
          fi
      - uses: astral-sh/setup-uv@v3
        if: steps.drift.outputs.changed == 'true'
        with:
          enable-cache: true
      - name: Install
        if: steps.drift.outputs.changed == 'true'
        run: uv sync --group codegen
      - name: Regenerate
        if: steps.drift.outputs.changed == 'true'
        run: uv run ariadne-codegen
      - name: Open PR
        id: cpr
        if: steps.drift.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: regenerate SDK from schema"
          title: "chore: regenerate SDK from schema"
          branch: codegen/regen
          body: |
            Auto-regenerated by `.github/workflows/codegen.yml`.

            Nightly (06:00 UTC) job detected drift in `schema.graphql` (source:
            `${{ env.REMOTE_SCHEMA_URL }}`) and re-ran `ariadne-codegen`.
            Auto-merge enabled — merges once a CODEOWNER approves and CI passes.
      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
