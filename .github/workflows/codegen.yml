name: codegen

# Nightly: fetches the public schema SDL. If it drifted, reruns ariadne-codegen
# and opens a PR. A human reviews and merges; downstream workflows (ci, docs,
# publish) fire on the merge to main. Rulesets on main forbid direct pushes.

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
    paths:
      - "schema.graphql"
      - ".github/workflows/codegen.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  REMOTE_SCHEMA_URL: https://app.playerdata.co.uk/api/schema.graphql

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch latest schema
        run: curl -fsSL "$REMOTE_SCHEMA_URL" -o schema.graphql
      - name: Detect schema drift
        id: drift
        run: |
          if git diff --quiet -- schema.graphql; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Schema unchanged — skipping codegen."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Schema drifted — running codegen."
          fi
      - uses: astral-sh/setup-uv@v3
        if: steps.drift.outputs.changed == 'true'
        with:
          enable-cache: true
      - name: Install
        if: steps.drift.outputs.changed == 'true'
        run: uv sync --group codegen --group test
      - name: Regenerate
        if: steps.drift.outputs.changed == 'true'
        run: uv run ariadne-codegen
      - name: Format
        if: steps.drift.outputs.changed == 'true'
        run: uv run ruff format .
      - name: Lint (autofix)
        if: steps.drift.outputs.changed == 'true'
        run: uv run ruff check --fix --exit-zero .
      - name: Lint (verify)
        if: steps.drift.outputs.changed == 'true'
        run: uv run ruff check .
      - name: Open PR
        if: steps.drift.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat: regenerate SDK from schema"
          title: "feat: regenerate SDK from schema"
          branch: codegen/regen
          body: |
            Auto-regenerated by `.github/workflows/codegen.yml`.

            Nightly (06:00 UTC) job detected drift in `schema.graphql` (source:
            `${{ env.REMOTE_SCHEMA_URL }}`) and re-ran `ariadne-codegen`.

            Review and merge to release. Uses `feat:` prefix so `semantic-release`
            cuts a new version and `publish.yml` releases the SDK to PyPI on merge
            to `main`. Docs deploy automatically via `docs.yml`.
